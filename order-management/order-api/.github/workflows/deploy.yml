name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/order-api .
        docker push ${{ secrets.DOCKER_USERNAME }}/order-api

    - id: auth
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_KEY }}

    - name: Setup Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v3

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials order-api-cluster --zone us-central1 --project order-api-project-492220

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml