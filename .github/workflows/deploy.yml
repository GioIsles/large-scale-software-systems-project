name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/order-api ./order-management/order-api
        docker push ${{ secrets.DOCKER_USERNAME }}/order-api

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_KEY }}

    - name: Get GKE credentials
      uses: google-github-actions/get-gke-credentials@v0.4.0
      with:
        cluster_name: order-api-cluster
        location: us-central1
        project_id: order-api-project-492220

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f ./order-management/order-api/deployment.yaml
        kubectl apply -f ./order-management/order-api/service.yaml